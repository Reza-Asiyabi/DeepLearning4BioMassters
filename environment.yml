name: biomassters
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults

dependencies:
  - python=3.10
  - pip>=23.0

  # PyTorch (CUDA 11.8 build)
  - pytorch=2.1.0=py3.10_cuda11.8_cudnn8.7.0_0
  - torchvision=0.16.0
  - torchaudio=2.1.0
  - pytorch-cuda=11.8

  # Scientific stack
  - numpy>=1.24.0
  - scipy>=1.11.0
  - scikit-learn>=1.3.0

  # Geospatial
  - rasterio>=1.3.0
  - gdal>=3.6.0

  # Visualisation
  - matplotlib>=3.7.0
  - seaborn>=0.13.0

  # Notebooks
  - jupyter>=1.0.0
  - ipywidgets>=8.1.0
  - ipykernel>=6.25.0

  # Dev tools
  - pytest>=7.4.0
  - black>=23.10.0

  # pip-installed packages
  - pip:
    - pytorch-lightning==2.1.0
    - torchmetrics>=1.2.0
    - omegaconf>=2.3.0
    - timm==0.9.12
    - huggingface_hub>=0.19.0
    - datasets>=2.14.0
    - wandb>=0.16.0
    - tqdm>=4.66.0
    - pytest-cov>=4.1.0
    - ruff>=0.1.5
    - mypy>=1.5.0
    - -e .
