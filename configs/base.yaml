data:
  root_dir: data/biomassters
  modalities: [s1, s2]
  months: null          # null = all 12 months
  batch_size: 8
  num_workers: 4
  val_split: 0.1
  pin_memory: true

training:
  max_epochs: 50
  precision: "16-mixed"
  gradient_clip_val: 1.0
  accumulate_grad_batches: 1
  seed: 42
  deterministic: false  # true for full reproducibility (slower)

optimizer:
  name: adamw
  lr: 1.0e-4
  weight_decay: 1.0e-4
  betas: [0.9, 0.999]

scheduler:
  name: cosine
  T_max: 50
  eta_min: 1.0e-6

loss:
  name: masked_rmse

logging:
  project: biomassters-agb
  entity: null          # W&B team/user name (null = personal)
  log_every_n_steps: 50
  log_images: true
  log_images_n: 4

checkpoint:
  monitor: val/rmse
  mode: min
  save_top_k: 3
  filename: "{epoch:03d}-{val/rmse:.3f}"
