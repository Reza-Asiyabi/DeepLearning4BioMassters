name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Linting ─────────────────────────────────────────────────────────────────
  lint:
    name: Lint (ruff + black)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-lint-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-lint-

      - name: Install linting tools
        run: pip install ruff black

      - name: Run ruff
        run: ruff check src/ tests/ scripts/

      - name: Run black (check mode)
        run: black --check src/ tests/ scripts/

  # ── Unit tests ───────────────────────────────────────────────────────────────
  test:
    name: Unit Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-py${{ matrix.python-version }}-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-py${{ matrix.python-version }}-

      - name: Install CPU-only PyTorch + dependencies
        run: |
          pip install --upgrade pip
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt
          pip install -e .

      - name: Run pytest with coverage
        env:
          PYTHONPATH: src
        run: |
          pytest tests/ -v \
            --tb=short \
            --cov=src/biomassters \
            --cov-report=term-missing \
            --cov-report=xml \
            -x

      - name: Upload coverage report
        if: matrix.python-version == '3.10'
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false

  # ── Type checking (optional) ─────────────────────────────────────────────────
  typecheck:
    name: Type Check (mypy)
    runs-on: ubuntu-latest
    continue-on-error: true   # Non-blocking until type annotations are complete
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt mypy types-PyYAML
          pip install -e .

      - name: Run mypy
        run: mypy src/biomassters/ --ignore-missing-imports --no-error-summary
